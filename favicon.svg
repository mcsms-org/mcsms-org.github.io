<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="nodeGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="1" />
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="20" fill="#0d1117"/>
  
  <!-- Synapse Connections -->
  <g stroke="#58a6ff" stroke-width="0.5" opacity="0.4">
    <line x1="25" y1="25" x2="50" y2="50" />
    <line x1="75" y1="25" x2="50" y2="50" />
    <line x1="25" y1="75" x2="50" y2="50" />
    <line x1="75" y1="75" x2="50" y2="50" />
    <line x1="50" y1="20" x2="50" y2="80" />
    <line x1="20" y1="50" x2="80" y2="50" />
  </g>

  <!-- Central Node -->
  <circle cx="50" cy="50" r="6" fill="#58a6ff" filter="url(#glow)">
    <animate attributeName="r" values="5;7;5" dur="3s" repeatCount="indefinite" />
  </circle>

  <!-- Satellite Nodes -->
  <circle cx="25" cy="25" r="3" fill="#58a6ff" opacity="0.8" />
  <circle cx="75" cy="25" r="3" fill="#58a6ff" opacity="0.8" />
  <circle cx="25" cy="75" r="3" fill="#58a6ff" opacity="0.8" />
  <circle cx="75" cy="75" r="3" fill="#58a6ff" opacity="0.8" />
</svg>
