<body class="page-spaced">

    <div id="ui">
        <h2>Boids Simulation</h2>
        <p>This is a Boids simulation: individual "birds" follow 3 simple rules to flock together.</p>
    </div>
    <canvas id="canvas"></canvas>
    
    <footer style="position: absolute; bottom: 10px; right: 10px; color: #555; font-size: 0.8rem;">
        Vibe-coded by Gemini
    </footer>

    <script>
        // --- 1. SETUP: Prepare the drawing area ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        // Make the canvas fill the whole browser window
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- 2. INITIALIZATION: Create the "birds" (Boids) ---
        // A boid is just an object with a position (x, y) and speed (vx, vy).
        let boids = Array.from({length: 80}, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: Math.random() * 4 - 2, // Velocity (speed and direction)
            vy: Math.random() * 4 - 2
        }));

        // --- 3. ANIMATION: This function runs 60 times every second ---
        function animate() {
            // Paint a semi-transparent black over the screen to create the "fading" motion trail
            ctx.fillStyle = 'rgba(5, 8, 16, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Loop through every bird one by one
            boids.forEach(b => {
                let ax = 0, ay = 0; // Acceleration: how much we change speed
                
                // --- 4. FLOCKING RULES: Look at neighbors to decide where to go ---
                boids.forEach(other => {
                    // Calculate distance using simple Pythagorean theorem (a^2 + b^2 = c^2)
                    let dx = b.x - other.x;
                    let dy = b.y - other.y;
                    let d = Math.sqrt(dx*dx + dy*dy);
                    
                    // Only care about neighbors within 100 pixels
                    if (d > 0 && d < 100) {
                        // RULE 1: Separation (Avoid hitting neighbors)
                        // Pushes boid away if it gets too close
                        ax += dx / (d * d); 
                        ay += dy / (d * d);
                        
                        // RULE 2: Alignment (Match speed of neighbors)
                        // Slowly adjusts velocity to match nearby birds
                        ax += (other.vx - b.vx) * 0.05;
                        ay += (other.vy - b.vy) * 0.05;
                        
                        // RULE 3: Cohesion (Stay with the group)
                        // Pulls boid toward the average center of nearby neighbors
                        ax += (other.x - b.x) * 0.0005;
                        ay += (other.y - b.y) * 0.0005;
                    }
                });

                // --- 5. PHYSICS: Update position based on rules ---
                // Apply the total forces (acceleration) to velocity
                b.vx += ax; 
                b.vy += ay;
                
                // Speed Limit: Don't let them fly too fast
                let s = Math.sqrt(b.vx**2 + b.vy**2);
                if (s > 4) { b.vx = (b.vx/s)*4; b.vy = (b.vy/s)*4; }
                
                // Update position
                b.x += b.vx; 
                b.y += b.vy;
                
                // Wrap around: If they hit the edge, appear on the opposite side
                if (b.x < 0) b.x = canvas.width; if (b.x > canvas.width) b.x = 0;
                if (b.y < 0) b.y = canvas.height; if (b.y > canvas.height) b.y = 0;

                // --- 6. RENDERING: Draw the bird (triangle) ---
                // Calculate which way it's facing based on velocity
                let angle = Math.atan2(b.vy, b.vx);
                let size = 6; 
                ctx.save();
                ctx.translate(b.x, b.y);
                ctx.rotate(angle);
                ctx.fillStyle = '#FFFFFF'; 
                ctx.beginPath();
                ctx.moveTo(size, 0);       // Nose
                ctx.lineTo(-size, size/2); // Back left
                ctx.lineTo(-size, -size/2);// Back right
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            });
            // Loop! Call this function again for the next frame
            requestAnimationFrame(animate);
        }
        
        // Start the engine
        animate();
    </script>
    <script src="main.js" defer></script>
</body>
