<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        body { margin: 0; background: #050810; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; max-width: 90vw; }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-spaced">
    <nav>
      <a href="/index.html" class="nav-logo">
        <span>Simulation & Modelling Society</span>
      </a>
      <div class="nav-links">
        <a href="/index.html">Home</a>

    <div id="ui">
        <h2>Boids Simulation</h2>
        <p>This is a Boids simulation: individual "birds" follow 3 simple rules to flock together.</p>
        <div style="font-size: 0.8rem; margin: 10px 0;">
            <label>Separation: <input type="range" id="sep" min="0" max="0.5" step="0.01" value="0.05"></label><br>
            <label>Alignment: <input type="range" id="ali" min="0" max="0.2" step="0.01" value="0.05"></label><br>
            <label>Cohesion: <input type="range" id="coh" min="0" max="0.002" step="0.0001" value="0.0005"></label>
        </div>
        <p style="font-size: 0.8rem; color: #aaa;">
            <em>Background:</em> This is based on Craig Reynolds' 1987 research. 
            <a href="/resources/reynolds-boids-1987.pdf" style="color: #0A84FF;">Download Original Paper</a> 
        </p>
    </div>
    <canvas id="canvas"></canvas>
    
    <footer style="position: absolute; bottom: 10px; right: 10px; color: #555; font-size: 0.8rem;">
        Vibe-coded by Gemini
    </footer>

    <script>
        // --- 1. SETUP: Prepare the drawing area ---
        // Get access to the <canvas> element (the drawing board) in the HTML
        const canvas = document.getElementById('canvas');
        // 'ctx' (context) is the object we use to actually draw shapes and lines
        const ctx = canvas.getContext('2d');
        // Make the drawing area match the size of the browser window
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- 2. INITIALIZATION: Create the "birds" (Boids) ---
        // A "boid" is a virtual bird. We create 80 of them.
        // Each boid has a position (x, y) and velocity (vx, vy - how fast/which way it is going).
        let boids = Array.from({length: 80}, () => ({
            x: Math.random() * canvas.width,    // Random starting X position
            y: Math.random() * canvas.height,   // Random starting Y position
            vx: Math.random() * 4 - 2,          // Random starting velocity X (-2 to 2)
            vy: Math.random() * 4 - 2           // Random starting velocity Y (-2 to 2)
        }));

        // --- 3. ANIMATION: This function runs 60 times every second ---
        // It clears the frame and draws everything again to create motion.
        function animate() {
            // Paint a semi-transparent black over the screen to create the "fading" motion trail
            ctx.fillStyle = 'rgba(5, 8, 16, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Loop through every single bird in our list
            boids.forEach(b => {
                // Acceleration is how much the velocity changes. We start at 0 each frame.
                let ax = 0, ay = 0; 
                
                // --- 4. FLOCKING RULES: Look at neighbors to decide where to go ---
                // Every bird looks at every other bird to see who is nearby.
                boids.forEach(other => {
                    // How far is the other bird from me?
                    let dx = b.x - other.x;
                    boids.forEach(other => {
                        let dx = b.x - other.x;
                        let dy = b.y - other.y;
                        let d = Math.sqrt(dx*dx + dy*dy); 

                        if (d > 0 && d < 100) {
                            // Apply weights from UI sliders
                            let sepW = parseFloat(document.getElementById('sep').value);
                            let aliW = parseFloat(document.getElementById('ali').value);
                            let cohW = parseFloat(document.getElementById('coh').value);

                            // 1. Separation
                            ax += (dx / (d * d)) * sepW;
                            ay += (dy / (d * d)) * sepW;
                            // 2. Alignment
                            ax += (other.vx - b.vx) * aliW;
                            ay += (other.vy - b.vy) * aliW;
                            // 3. Cohesion
                            ax += (other.x - b.x) * cohW;
                            ay += (other.y - b.y) * cohW;
                        }
                    });
                // --- 5. PHYSICS: Update position based on rules ---
                // Add the rules' forces (acceleration) to velocity
                b.vx += ax; 
                b.vy += ay;
                
                // Speed Limit: Ensure birds don't get infinitely fast
                let s = Math.sqrt(b.vx**2 + b.vy**2);
                if (s > 4) { 
                    b.vx = (b.vx/s)*4; // Scale X velocity down to 4
                    b.vy = (b.vy/s)*4; // Scale Y velocity down to 4
                }
                
                // Update position: add velocity to the current X and Y
                b.x += b.vx; 
                b.y += b.vy;
                
                // Screen Wrap: If a bird goes off the screen, appear on the opposite side
                if (b.x < 0) b.x = canvas.width;    // Off left? Move to right
                if (b.x > canvas.width) b.x = 0;    // Off right? Move to left
                if (b.y < 0) b.y = canvas.height;   // Off top? Move to bottom
                if (b.y > canvas.height) b.y = 0;   // Off bottom? Move to top

                // --- 6. RENDERING: Draw the bird as a triangle ---
                // Calculate the angle based on which way the bird is flying
                let angle = Math.atan2(b.vy, b.vx);
                let size = 6; 
                ctx.save();
                ctx.translate(b.x, b.y); // Move origin to bird's position
                ctx.rotate(angle);       // Point in direction of travel
                ctx.fillStyle = '#FFFFFF'; // Color the bird white
                ctx.beginPath();
                ctx.moveTo(size, 0);       // Triangle nose
                ctx.lineTo(-size, size/2); // Triangle bottom-left
                ctx.lineTo(-size, -size/2);// Triangle bottom-right
                ctx.closePath();           // Connect back to nose
                ctx.fill();
                ctx.restore(); // Undo the translation/rotation for the next bird
            });
            // Loop: Tell the browser to call this animate function again
            requestAnimationFrame(animate);
        }
        
        // --- 7. START: Trigger the animation loop ---
        animate();
    </script>
    <script src="main.js" defer></script>
</body>
</html>
